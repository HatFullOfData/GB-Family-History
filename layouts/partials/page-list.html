{{ with .pages }}
  <div class="page-list-header">
    {{ range sort . "Title" }}
      {{ if eq .Section "people" }}
        {{ partial "person-summary.html" . }}
      {{ else }}
        <p><a href="{{ .RelPermalink }}">{{ .Title }}</a></p>
      {{ end }}
    {{ end }}
  </div>
{{ else }}
  <p>{{ .empty | default "No entries yet." }}</p>
{{ end }}
