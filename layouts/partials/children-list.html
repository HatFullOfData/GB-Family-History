{{ $page := .page }}
{{ $children := partial "child-pages.html" $page }}
<section>
  <h2>{{ .title }}</h2>
  {{ with $children }}
    <div class="children-list">
    {{ range . }}
      {{ partial "person-summary.html" . }}
    {{ end }}
    </div>
  {{ else }}
    <p>{{ .empty | default "No entries yet." }}</p>
  {{ end }}
</section>
