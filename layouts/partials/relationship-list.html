<section>
  <h2>{{ .title }}</h2>
  {{ with .values }}
    <ul>
      {{ range . }}
        {{ with site.GetPage . }}
          {{ if $.render }}
            {{ partial $.render . }}
          {{ else }}
            <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
          {{ end }}
        {{ end }}
      {{ end }}
    </ul>
  {{ else }}
    <p>{{ .empty | default "No entries yet." }}</p>
  {{ end }}
</section>
